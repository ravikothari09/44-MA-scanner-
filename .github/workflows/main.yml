name: Nifty Scanner

on:
  schedule:
    - cron: '35 12 * * 1-5'

  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install libraries
      run: pip install -r requirements.txt

    - name: Run Bot
      run: python bot.py
